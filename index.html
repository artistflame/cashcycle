<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashCycle.ai — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="icon-cashcycle.svg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #FAFAFF;
      color: #0F172A;
      position: relative;
      overflow: hidden;
    }

    /* Soft grid */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 70, 229, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.025) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    /* Ambient orb top-right */
    .orb-1 {
      position: absolute;
      top: -300px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Ambient orb bottom-left */
    .orb-2 {
      position: absolute;
      bottom: -300px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: 520px;
      margin-bottom: 4rem;
      display: block;
    }

    .coming-soon {
      font-size: 1.1rem;
      font-weight: 500;
      color: #94A3B8;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .logo { width: 320px; margin-bottom: 3rem; }
      .coming-soon { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="container">
    <img src="logo-cashcycle.svg" alt="CashCycle" class="logo">
    <p class="coming-soon">Coming soon</p>
  </div>
</body>
</html>
